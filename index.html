<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffe6f0;
  overflow:hidden;
  text-align:center;
}

h1{
  margin-top:80px;
  color:#ff4d88;
}

p{
  font-size:18px;
  padding:0 20px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d88;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:20px;
}

button:hover{
  background:#ff1a66;
}

/* floating hearts */
.heart{
  position:absolute;
  color:#ff4d88;
  font-size:20px;
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{
    transform:translateY(100vh);
    opacity:1;
  }
  100%{
    transform:translateY(-10vh);
    opacity:0;
  }
}

.bear{
  font-size:80px;
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

#hug{
  display:none;
  font-size:60px;
  margin-top:30px;
}
</style>

</head>

<body>

<div class="bear">🐻</div>

<h1>Hey Handsome ❤️</h1>

<p>
Happy Birthday!  
I made this little page just for you.  
I hope this made you blush a little bit… madam ji would approve 😌
</p>

<button onclick="showHug()">Open your virtual hug 🤗</button>

<div id="hug">🤗💖🤗</div>

<script>

/* floating hearts generator */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="💖";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+15)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>{heart.remove()},6000);
},500);


/* virtual hug */
function showHug(){
  document.getElementById("hug").style.display="block";
}

</script>

</body>
</html>
